name: CI

on:
  push:
    branches: [main, develop, push-final]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: uca_test
          POSTGRES_USER: uca
          POSTGRES_PASSWORD: uca123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      DATABASE_URL: postgresql://uca:uca123@localhost:5432/uca_test
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r backend/requeriments.txt
      - run: pip install pytest httpx
      - run: alembic upgrade head
        working-directory: backend
      - run: pytest --tb=short -q --ignore=tests/test_postgres_compat.py
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
        continue-on-error: true
      - run: npm run test:run
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
