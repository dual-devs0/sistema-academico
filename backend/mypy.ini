[mypy]
ignore_missing_imports = True
explicit_package_bases = True

# El codebase usa Column() clásico de SQLAlchemy, no Mapped[] (2.0-style) --
# mypy ve cada atributo como Column[T] en vez de T. El plugin oficial
# (sqlalchemy.ext.mypy.plugin) empeora esto acá (pasa de 267 a 377 errores,
# mezcla Mapped[Any] con Column() clásico) — deshabilitado a propósito.
# Los ~267 errores de "Column[T] incompatible con T" son ruido sistémico
# del estilo de declaración, no bugs — a runtime cuota.id es un int real.
# Deuda técnica real: migrar modelos a Mapped[] resolvería esto de raíz.
